[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [
    { access = "read", path = "./" },
    { access = "write", path = "./deployments" },
]
ffi = true

[profile.ci]
verbosity = 4
fuzz = { runs = 1000 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC}"
mantle_mainnet = "${MANTLE_MAINNET_RPC}"

# Mantlescan's standalone V1 API is dead; verify via the Etherscan V2 multichain endpoint
# (one ETHERSCAN_API_KEY, chain selected by ?chainid=). Mantle Sepolia = 5003, Mainnet = 5000.
[etherscan]
mantle_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5003", chain = 5003 }
mantle_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5000", chain = 5000 }
